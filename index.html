<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المصحف المرتل | صفاء الروح</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #1e4d2b;
            --accent-gold: #d4af37;
            --text-dark: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: #fcfcfc; font-family: 'Tajawal', sans-serif; color: var(--text-dark); display: flex; flex-direction: column; align-items: center; }

        /* 🔔 التنبيه العلوي المحسن للتحميل الداخلي */
        .top-alert {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px;
            background: var(--primary-green); color: white;
            padding: 15px; border-radius: 12px;
            display: flex; flex-direction: column; gap: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            z-index: 10000; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-bottom: 3px solid var(--accent-gold);
        }
        .top-alert.show { top: 15px; }
        
        /* شريط تقدم التحميل */
        .progress-container { width: 100%; background: rgba(255,255,255,0.2); height: 4px; border-radius: 2px; display: none; }
        .progress-bar { width: 0%; height: 100%; background: var(--accent-gold); transition: width 0.2s; }

        /* 🎨 الهيدر */
        .header-bg {
            background: linear-gradient(135deg, var(--primary-green), #0d2818);
            height: 160px; width: 100%; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative;
        }
        .header-bg h1 { color: white; font-size: 1.4rem; font-weight: 900; }
        .logo-box { position: absolute; bottom: -30px; width: 70px; height: 70px; background: #fff; border-radius: 50%; padding: 3px; border: 2px solid var(--accent-gold); }
        .logo-box img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        /* 🎵 المشغل */
        .player-master {
            position: sticky; top: 10px; z-index: 1000; width: 92%; max-width: 420px; 
            background: #ffffff; border-radius: 20px; padding: 15px; margin: 50px 0 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #eee;
        }
        .now-playing-title { color: var(--primary-green); font-weight: 700; font-size: 0.9rem; text-align: center; display: block; margin-bottom: 8px; }
        audio { width: 100%; height: 35px; }

        /* 📜 القائمة */
        #quran-list { width: 92%; max-width: 420px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 40px; }
        .surah-card {
            background: #fff; border-radius: 12px; padding: 12px 15px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03); border: 1px solid #f0f0f0;
        }
        .surah-card.active { border-color: var(--accent-gold); background: #fdfaf0; }
        .surah-name { font-weight: 700; color: var(--primary-green); flex: 1; margin-right: 10px; }
        
        .btn-download { color: var(--accent-gold); padding: 8px; font-size: 1.3rem; cursor: pointer; }
        .btn-download.loading { color: #ccc; pointer-events: none; animation: pulse 1s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        footer { padding: 20px; color: #bbb; font-size: 0.7rem; }
    </style>
</head>
<body>

    <div id="top-alert" class="top-alert">
        <div style="display:flex; align-items:center; gap:10px;">
            <i class="fas fa-download"></i>
            <div id="alert-text" style="font-weight: bold; font-size: 0.85rem;">جاري بدء التحميل الداخلي...</div>
        </div>
        <div class="progress-container" id="p-container">
            <div class="progress-bar" id="p-bar"></div>
        </div>
    </div>

    <div class="header-bg">
        <h1>المصحف المرتل</h1>
        <div class="logo-box">
            <img src="https://i.postimg.cc/zGSvxgCn/1775323811617.png" alt="صفاء الروح">
        </div>
    </div>

    <div class="player-master">
        <span class="now-playing-title" id="current-title">اختر سورة للاستماع 🎧</span>
        <audio id="main-audio" controls></audio>
    </div>

    <div id="quran-list"></div>

    <footer>DESIGN BY sabriFX | 2026</footer>

    <script>
        const allSurahNames = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];

        const alertBox = document.getElementById('top-alert');
        const alertText = document.getElementById('alert-text');
        const pBar = document.getElementById('p-bar');
        const pContainer = document.getElementById('p-container');

        // 📥 وظيفة التحميل الداخلي المتطورة
        async function internalDownload(url, name, btn) {
            btn.classList.add('loading');
            alertText.innerText = `جاري تحميل سورة ${name}...`;
            alertBox.classList.add('show');
            pContainer.style.display = 'block';
            pBar.style.width = '0%';

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('فشل الاتصال بالسيرفر');
                
                const reader = response.body.getReader();
                const contentLength = +response.headers.get('Content-Length');
                let receivedLength = 0;
                let chunks = [];

                while(true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    chunks.push(value);
                    receivedLength += value.length;
                    
                    // تحديث شريط التقدم
                    if (contentLength) {
                        let step = (receivedLength / contentLength) * 100;
                        pBar.style.width = step + '%';
                    }
                }

                // تجميع البيانات وتحويلها لملف
                let blob = new Blob(chunks, {type: 'audio/mpeg'});
                let blobUrl = window.URL.createObjectURL(blob);
                
                // إنشاء رابط وهمي للنقر والتحميل داخل التطبيق
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = `سورة ${name} - ماهر المعيقلي.mp3`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(blobUrl);

                alertText.innerText = `✅ تم تحميل ${name} بنجاح!`;
                setTimeout(() => alertBox.classList.remove('show'), 3000);

            } catch (error) {
                alertText.innerText = `❌ خطأ في التحميل الداخلي`;
                console.error(error);
                setTimeout(() => alertBox.classList.remove('show'), 3000);
            } finally {
                btn.classList.remove('loading');
                pContainer.style.display = 'none';
            }
        }

        function renderList() {
            const container = document.getElementById('quran-list');
            allSurahNames.forEach((name, i) => {
                const num = (i + 1).toString().padStart(3, '0');
                const url = `https://server12.mp3quran.net/maher/${num}.mp3`;
                
                const card = document.createElement('div');
                card.className = 'surah-card';
                card.innerHTML = `
                    <div style="display:flex; align-items:center; flex:1;" onclick="play('${url}', '${name}', this.closest('.surah-card'))">
                        <span class="surah-name">سورة ${name}</span>
                    </div>
                    <i class="fas fa-arrow-alt-circle-down btn-download" onclick="event.stopPropagation(); internalDownload('${url}', '${name}', this)"></i>
                `;
                container.appendChild(card);
            });
        }

        function play(url, name, el) {
            document.querySelectorAll('.surah-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            const audio = document.getElementById('main-audio');
            document.getElementById('current-title').innerText = "🔊 سورة " + name;
            audio.src = url;
            audio.play();
        }

        window.onload = renderList;
    </script>
</body>
</html>
