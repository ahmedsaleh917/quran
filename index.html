<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المصحف المرتل | صفاء الروح</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --main-green: #1a4d2e;
            --dark-green: #0d2818;
            --gold-accent: #d4af37;
            --soft-white: #f8fafc;
            --glass: rgba(255, 255, 255, 0.9);
            --card-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background-color: var(--soft-white);
            font-family: 'Almarai', sans-serif;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.6;
        }

        /* صفحة Offline المحسنة لتناسب الهوية الجديدة */
        #offline-page {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--main-green), var(--dark-green));
            z-index: 9999;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }        
        #offline-page.show { display: flex; }
        
        .offline-container {
            background: #fff;
            border-radius: 30px;
            padding: 40px 20px;
            text-align: center;
            max-width: 350px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            border-bottom: 5px solid var(--gold-accent);
        }
        
        .offline-icon-wrapper {
            width: 80px;
            height: 80px;
            background: rgba(26, 77, 46, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: var(--main-green);
            font-size: 30px;
        }

        /* الهيدر المطور (متناسق مع الإندكس) */
        .header-bg {
            background: linear-gradient(rgba(26, 77, 46, 0.8), rgba(26, 77, 46, 0.7)), 
                        url('https://i.postimg.cc/zvS6s80G/IMG-20260404-200653.jpg') center/cover;
            height: 200px;
            width: 100%;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .header-bg h1 {
            color: white;
            font-size: 22px;
            font-weight: 800;
            margin-top: -20px;
        }
        
        .logo-box {
            position: absolute;
            bottom: -35px;
            width: 90px;
            height: 90px;
            background: #fff;
            border-radius: 25px;
            padding: 5px;
            border: 3px solid #fff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        
        .logo-box img {
            width: 100%;
            height: 100%;
            border-radius: 20px;
            object-fit: cover;
        }

        /* مشغل الصوت الرئيسي */
        .player-master {
            position: sticky;
            top: 15px;
            z-index: 1000;
            width: 92%;
            max-width: 500px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 20px;
            margin: 55px auto 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.5);
        }
        
        .now-playing-title {
            color: var(--main-green);
            font-weight: 800;
            font-size: 15px;
            text-align: center;
            margin-bottom: 15px;
            display: block;
        }
        
        audio {
            width: 100%;
            height: 45px;
            filter: sepia(20%) saturate(70%) grayscale(1) contrast(90%) invert(12%); /* تلوين خفيف للمشغل */
        }

        /* قائمة السور */
        #quran-list {
            width: 92%;
            max-width: 500px;
            margin: 0 auto;
            display: grid;
            gap: 12px;
            padding-bottom: 40px;
        }
        
        .surah-card {
            background: #fff;
            border-radius: 20px;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--card-shadow);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }
        
        .surah-card:hover {
            transform: translateY(-3px);
            border-color: var(--gold-accent);
        }
        
        .surah-card.active {
            background: #f0f7f2;
            border-color: var(--main-green);
        }
        
        .surah-info {
            display: flex;
            align-items: center;
        }
        
        .surah-number {
            background: rgba(26, 77, 46, 0.1);
            color: var(--main-green);
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            margin-left: 15px;
            font-size: 14px;
        }
        
        .surah-name {
            font-weight: 700;
            color: #2c3e50;
            font-size: 15px;
        }
        
        .actions {
            display: flex;
            gap: 10px;
        }

        .play-btn-item {
            color: var(--main-green);
            font-size: 18px;
        }

        .download-link {
            background: var(--gold-accent);
            color: white !important;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-size: 14px;
            text-decoration: none;
            transition: 0.3s;
        }
        
        .download-link:active { transform: scale(0.9); }
        
        /* مؤشر التحميل */
        #loading {
            text-align: center;
            padding: 40px;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #ddd;
            border-top-color: var(--gold-accent);
            border-radius: 50%;
            margin: 0 auto 10px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }

        footer {
            padding: 30px;
            text-align: center;
            font-size: 12px;
            color: #999;
            background: #fff;
            border-top: 1px solid #eee;
        }

        footer span { color: var(--main-green); font-weight: 800; }

        /* زر إعادة الاتصال */
        #connection-status {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--main-green);
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: 700;
            z-index: 2000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        #connection-status.show { display: block; }

    </style>
</head>
<body>

<div id="offline-page">
    <div class="offline-container">
        <div class="offline-icon-wrapper">
            <i class="fas fa-wifi-slash"></i>
        </div>
        <h2 style="color:var(--main-green); margin-bottom:10px;">لا يوجد اتصال!</h2>
        <p style="color:#777; font-size:14px;">يرجى الاتصال بالإنترنت للاستماع للمصحف المرتل.</p>
    </div>
</div>

<div id="main-content">
    <div class="header-bg">
        <h1>المصحف المرتل</h1>
        <div class="logo-box">
            <img src="https://i.postimg.cc/05cL5zw5/20260405-135743.png" alt="صفاء الروح">
        </div>
    </div>

    <div class="player-master">
        <span class="now-playing-title" id="current-title">اختر سورة للاستماع 🎧</span>
        <audio id="main-audio" controls preload="metadata"></audio>
    </div>

    <div id="loading" style="display: none;">
        <div class="spinner"></div>
        <p>جاري تحميل القائمة...</p>
    </div>

    <div id="quran-list">
        </div>

    <footer>
        تطوير <span>sabriFX</span> &copy; 2026
    </footer>
</div>

<div id="connection-status" onclick="checkConnection()">
    <i class="fas fa-sync-alt"></i> تحديث الاتصال
</div>

<script>
const allSurahNames = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];

function checkConnection() {
    if (navigator.onLine) {
        document.getElementById('offline-page').classList.remove('show');
        document.getElementById('connection-status').classList.remove('show');
        renderList();
    } else {
        document.getElementById('offline-page').classList.add('show');
    }
}

function renderList() {
    const container = document.getElementById('quran-list');
    const loading = document.getElementById('loading');
    
    if (container.children.length > 0) return; // منع التكرار

    loading.style.display = 'block';
    
    setTimeout(() => {
        const fragment = document.createDocumentFragment();
        allSurahNames.forEach((name, i) => {
            const num = (i + 1).toString().padStart(3, '0');
            const url = `https://server12.mp3quran.net/maher/${num}.mp3`;
            
            const card = document.createElement('div');
            card.className = 'surah-card';
            card.innerHTML = `
                <div class="surah-info">
                    <div class="surah-number">${i + 1}</div>
                    <span class="surah-name">سورة ${name}</span>
                </div>
                <div class="actions">
                    <i class="fa-solid fa-play play-btn-item"></i>
                    <a href="${url}" download="سورة_${name}.mp3" class="download-link" onclick="event.stopPropagation();">
                        <i class="fas fa-download"></i>
                    </a>
                </div>
            `;
            
            card.addEventListener('click', () => play(url, name, card));
            fragment.appendChild(card);
        });
        
        container.appendChild(fragment);
        loading.style.display = 'none';
    }, 500);
}

function play(url, name, el) {
    document.querySelectorAll('.surah-card').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    
    const audio = document.getElementById('main-audio');
    const title = document.getElementById('current-title');
    
    title.innerHTML = `🔊 جاري تشغيل: <span style="color:var(--gold-accent)">سورة ${name}</span>`;
    audio.src = url;
    audio.play().catch(e => console.log("خطأ في التشغيل"));
}

window.addEventListener('online', checkConnection);
window.addEventListener('offline', checkConnection);
window.addEventListener('load', checkConnection);
</script>
</body>
</html>
